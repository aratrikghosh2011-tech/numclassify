name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov hatchling
          pip install -e .

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=numclassify \
            --cov-report=term-missing \
            --cov-report=json \
            --cov-fail-under=75

      - name: Check coverage badge freshness
        run: python tools/check_repo.py --strict --fast

      - name: CLI smoke check
        run: |
          numclassify check 153
          numclassify check 6 --json
          numclassify find prime --limit 5
          numclassify info armstrong
          numclassify why prime 7
          numclassify compare 6 28
          numclassify query 1 100 --has prime --json
          numclassify

      - name: Repo health check
        run: python tools/check_repo.py --fast
